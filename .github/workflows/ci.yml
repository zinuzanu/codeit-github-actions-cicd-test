name: CI Workflow # 현재 워크플로우의 이름

on: # 워크플로우 실행 조건
  push: # 푸시가 발생하는 시점에
    branches: ["main"] # 메인 브랜치에서

jobs: # 실행할 작업 정의
  build: # 빌드라는 작업 설정
    runs-on: ubuntu-latest # 실행 환경 설정

    steps: # job안에서 실행될 단계
      - uses: actions/checkout@v3

      - name: JDK 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 빌드 및 테스트
        run: ./gradlew clean build

      - name: Docker Build 및 커밋 해시태그 설정
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          docker build -t myapp:$IMAGE_TAG .